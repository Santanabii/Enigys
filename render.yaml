services:
  - type: web
    name: enigys-1                   
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput"
    startCommand: "gunicorn core.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: enigys-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DJANGO_SETTINGS_MODULE
        value: "core.settings"
      - key: ALLOWED_HOSTS
        value: "enigys-1.onrender.com,localhost,127.0.0.1"
      - key: RENDER_EXTERNAL_URL
        value: "enigys-1.onrender.com"  # ← Match your service URL
      - key: RENDER_FRONTEND_URL
        value: "frontend-three-sooty-13.vercel.app"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://frontend-three-sooty-13.vercel.app,https://frontend-git-main-santanabiis-projects.vercel.app,http://localhost:5173"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://enigys-1.onrender.com,https://frontend-three-sooty-13.vercel.app,https://frontend-git-main-santanabiis-projects.vercel.app,http://localhost:5173"

databases:
  - name: calorie_db
    databaseName: calorie_db_g1y3
    user: calorie_db_g1y3_user